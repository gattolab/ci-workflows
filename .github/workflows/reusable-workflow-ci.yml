name: Reusable CI - Build & Deploy

on:
  workflow_call:
    inputs:
      app_name:
        description: "Application name (used for image name and manifest path)"
        required: true
        type: string
      deployment_path:
        description: "Path in the deployments repo where manifests live"
        required: true
        type: string
      build_args:
        description: "Additional docker build args (e.g. --build-arg GO_VERSION=1.22)"
        required: false
        type: string
        default: ""
      codeql_language:
        description: "Language for CodeQL analysis (go, python, javascript, java, cpp, csharp)"
        required: false
        type: string
        default: "go"
      unittest_command:
        description: "Command to run unit tests (e.g. 'go test ./...'). Leave empty to skip."
        required: false
        type: string
        default: ""
      trivy_severity:
        description: "Severity levels that cause Trivy to fail (CRITICAL,HIGH,MEDIUM,LOW)"
        required: false
        type: string
        default: "CRITICAL,HIGH"
      fail_on_security_issues:
        description: "Fail the pipeline if Trivy finds vulnerabilities at the given severity"
        required: false
        type: boolean
        default: true
      trivy_version:
        description: "Trivy binary version to install (e.g. 'v0.60.0')"
        required: false
        type: string
        default: "v0.60.0"
      go_version:
        description: "Go version to install on the runner (e.g. '1.22'). Required for Go projects (CodeQL + unit tests)."
        required: false
        type: string
        default: ""
    secrets:
      GHCR_TOKEN:
        description: "GitHub Container Registry token with read:packages and repo scope"
        required: true

permissions:
  contents: read
  packages: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ═══════════════════════════════════════════════════════════════════════
#  Pipeline flow
#
#  ① build ──────────────► ② trivy-scan ──────────► ③ security-gate ──► ④ push-image ──► ⑤ bump-image-tag
#  ① codeql ─────────────► ② sast-analysis ────────► ③ security-gate ──►
#  ① unittest ──────────────────────────────────────► ③ quality-gate  ──►
# ═══════════════════════════════════════════════════════════════════════

jobs:

  # ── GROUP 1  (all parallel) ─────────────────────────────────────────

  build:
    name: "Build Docker Image"
    runs-on: self-hosted
    outputs:
      image_tag:  ${{ steps.meta.outputs.image_tag }}
      image_name: ${{ steps.meta.outputs.image_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${{ inputs.app_name }}"
          IMAGE_TAG="$(git rev-parse --short HEAD)"
          echo "image_tag=$IMAGE_TAG"   >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build ${{ inputs.build_args }} \
            -t "${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}" .
          docker save \
            "${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}" \
            -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.meta.outputs.image_tag }}
          path: image.tar
          retention-days: 1

  codeql:
    name: "CodeQL Analysis"
    runs-on: self-hosted
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Go (explicit version)
        if: inputs.codeql_language == 'go' && inputs.go_version != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache: false

      - name: Setup Go (from go.mod)
        if: inputs.codeql_language == 'go' && inputs.go_version == ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node.js (required for JavaScript/TypeScript CodeQL extraction)
        if: inputs.codeql_language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ inputs.codeql_language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  unittest:
    name: "Unit Tests"
    runs-on: self-hosted
    outputs:
      result: ${{ steps.run.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go (explicit version)
        if: inputs.go_version != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache: false

      - name: Setup Go (from go.mod)
        if: inputs.go_version == '' && startsWith(inputs.unittest_command, 'go ')
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Run unit tests
        id: run
        run: |
          if [[ -z "${{ inputs.unittest_command }}" ]]; then
            echo "result=skipped" >> "$GITHUB_OUTPUT"
            echo "No unittest_command configured — skipping unit tests"
          else
            echo "Running: ${{ inputs.unittest_command }}"
            ${{ inputs.unittest_command }}
            echo "result=passed" >> "$GITHUB_OUTPUT"
          fi

  # ── GROUP 2  (parallel, each depends on one group-1 job) ────────────

  trivy-scan:
    name: "Trivy Image Scan"
    runs-on: self-hosted
    needs: [build]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ needs.build.outputs.image_tag }}

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Install Trivy
        env:
          TRIVY_VERSION: ${{ inputs.trivy_version }}
        run: |
          V="${TRIVY_VERSION#v}"
          mkdir -p "$HOME/.local/bin"
          curl -sSfL \
            "https://github.com/aquasecurity/trivy/releases/download/v${V}/trivy_${V}_Linux-64bit.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" trivy
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          trivy --version

      - name: Run Trivy vulnerability scan
        run: |
          EXIT_CODE=0
          [[ "${{ inputs.fail_on_security_issues }}" == "true" ]] && EXIT_CODE=1
          trivy image \
            --exit-code  "$EXIT_CODE" \
            --ignore-unfixed \
            --severity   "${{ inputs.trivy_severity }}" \
            --format     table \
            "${{ needs.build.outputs.image_name }}:${{ needs.build.outputs.image_tag }}"

  sast-analysis:
    name: "SAST Analysis"
    runs-on: self-hosted
    needs: [codeql]
    steps:
      - name: SAST gate passed
        run: echo "SAST gate cleared — CodeQL analysis passed"

  # ── GROUP 3  (parallel gates, depend on group-2 + unittest) ─────────
            
  security-gate:
    name: "Security Gate"
    runs-on: self-hosted
    needs: [trivy-scan, sast-analysis]
    steps:
      - name: Security gate passed
        run: echo "Security gate cleared — Trivy scan and SAST analysis both passed"
  
  quality-gate:
    name: "Quality Gate"
    runs-on: self-hosted
    needs: [unittest, sast-analysis]
    steps:
      - name: Quality gate passed
        run: |
          echo "Quality gate cleared"
          echo "Unit tests: ${{ needs.unittest.outputs.result }}"

  # ── GROUP 4 ─────────────────────────────────────────────────────────

  push-image:
    name: "Push Image to GHCR"
    runs-on: self-hosted
    needs: [build, security-gate, quality-gate]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ needs.build.outputs.image_tag }}

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push to GHCR
        run: |
          IMAGE_NAME="${{ needs.build.outputs.image_name }}"
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          docker push "$IMAGE_NAME:$IMAGE_TAG"
          docker tag  "$IMAGE_NAME:$IMAGE_TAG" "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:latest"
          echo "Pushed $IMAGE_NAME:$IMAGE_TAG and $IMAGE_NAME:latest"

  # ── GROUP 5 ─────────────────────────────────────────────────────────

  bump-image-tag:
    name: "Bump Image Tag in Manifests"
    runs-on: self-hosted
    needs: [push-image, build]
    steps:
      - name: Checkout deployment manifests
        uses: actions/checkout@v4
        with:
          repository: gattolab/infra-deployments
          token: ${{ secrets.GHCR_TOKEN }}
          path: deployment-repo

      - name: Update image tag in manifests
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          VALUES_FILE="deployment-repo/apps/${{ inputs.app_name }}/values.yaml"

          if [[ ! -f "$VALUES_FILE" ]]; then
            echo "::error::values file not found: $VALUES_FILE"
            exit 1
          fi

          # Install yq if not present
          if ! command -v yq &>/dev/null; then
            curl -sSfL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
              -o "$HOME/.local/bin/yq" && chmod +x "$HOME/.local/bin/yq"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

          yq -i ".image.tag = \"$IMAGE_TAG\"" "$VALUES_FILE"
          echo "Updated $VALUES_FILE → image.tag: $IMAGE_TAG"

      - name: Commit & push manifest changes
        run: |
          cd deployment-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "apps/${{ inputs.app_name }}/values.yaml"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update ${{ inputs.app_name }} image to ${{ needs.build.outputs.image_tag }}"
          git push

  # ── PIPELINE SUMMARY  (always runs, writes Mermaid diagram) ─────────

  pipeline-summary:
    name: "Pipeline Summary"
    runs-on: self-hosted
    if: always()
    needs:
      - build
      - codeql
      - unittest
      - trivy-scan
      - sast-analysis
      - security-gate
      - quality-gate
      - push-image
      - bump-image-tag
    steps:
      - name: Write pipeline summary
        env:
          R_BUILD:    ${{ needs.build.result }}
          R_CODEQL:   ${{ needs.codeql.result }}
          R_UNITTEST: ${{ needs.unittest.result }}
          R_TRIVY:    ${{ needs.trivy-scan.result }}
          R_SAST:     ${{ needs.sast-analysis.result }}
          R_SECGATE:  ${{ needs.security-gate.result }}
          R_QUALGATE: ${{ needs.quality-gate.result }}
          R_PUSH:     ${{ needs.push-image.result }}
          R_BUMP:     ${{ needs.bump-image-tag.result }}
          IMAGE_NAME: ${{ needs.build.outputs.image_name }}
          IMAGE_TAG:  ${{ needs.build.outputs.image_tag }}
        run: |
          badge() {
            case "$1" in
              success)   printf 'Passed'    ;;
              failure)   printf 'Failed'    ;;
              skipped)   printf 'Skipped'   ;;
              cancelled) printf 'Cancelled' ;;
              *)         printf '%s' "$1"   ;;
            esac
          }

          {
            echo "## 🚀 CI Pipeline — ${{ inputs.app_name }}"
            echo ""
            echo ""
            echo "### Job Results"
            echo ""
            echo "| Group | Job | Result |"
            echo "|:-----:|-----|--------|"
            echo "| 1 | Build Image       | $(badge "$R_BUILD")    |"
            echo "| 1 | CodeQL Analysis   | $(badge "$R_CODEQL")   |"
            echo "| 1 | Unit Tests        | $(badge "$R_UNITTEST") |"
            echo "| 2 | Trivy Image Scan  | $(badge "$R_TRIVY")    |"
            echo "| 2 | SAST Analysis     | $(badge "$R_SAST")     |"
            echo "| 3 | Security Gate     | $(badge "$R_SECGATE")  |"
            echo "| 3 | Quality Gate      | $(badge "$R_QUALGATE") |"
            echo "| 4 | Push to GHCR      | $(badge "$R_PUSH")     |"
            echo "| 5 | Bump Image Tag    | $(badge "$R_BUMP")     |"
            echo ""
            if [[ -n "$IMAGE_TAG" ]]; then
              echo "**Image:** \`${IMAGE_NAME}:${IMAGE_TAG}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
