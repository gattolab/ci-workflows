name: Reusable CI - Build & Deploy

on:
  workflow_call:
    inputs:
      app_name:
        description: "Application name (used for image name and manifest path)"
        required: true
        type: string
      deployment_path:
        description: "Path in the deployments repo where manifests live (e.g. deployments/wrappp/)"
        required: true
        type: string
      build_args:
        description: "Additional docker build args (e.g. --build-arg GO_VERSION=1.22)"
        required: false
        type: string
        default: ""
    secrets:
      GHCR_TOKEN:
        description: "GitHub Container Registry token with read:packages and repo scope"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: self-hosted

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push to GHCR
        id: build
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/${{ inputs.app_name }}
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

          if docker manifest inspect $IMAGE_NAME:$IMAGE_TAG > /dev/null 2>&1; then
            echo "Image $IMAGE_NAME:$IMAGE_TAG already exists, skipping build"
          else
            echo "Building and pushing $IMAGE_NAME:$IMAGE_TAG"
            docker build ${{ inputs.build_args }} -t $IMAGE_NAME:$IMAGE_TAG .
            docker push $IMAGE_NAME:$IMAGE_TAG
          fi

          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest

      - name: Checkout deployment manifests
        uses: actions/checkout@v4
        with:
          repository: gattolab/infra-deployments
          token: ${{ secrets.GHCR_TOKEN }}
          path: deployment-repo

      - name: Update image tag in manifests
        run: |
          IMAGE_TAG=${{ steps.build.outputs.image_tag }}
          IMAGE_NAME=${{ steps.build.outputs.image_name }}

          find deployment-repo/${{ inputs.deployment_path }} -name "*.yaml" -o -name "*.yml" | \
            xargs sed -i "s|image:.*${{ inputs.app_name }}.*|image: $IMAGE_NAME:$IMAGE_TAG|g"

          echo "Updated manifests with image: $IMAGE_NAME:$IMAGE_TAG"

      - name: Commit & push manifest changes
        run: |
          cd deployment-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.deployment_path }}
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update ${{ inputs.app_name }} image to ${{ steps.build.outputs.image_tag }}"
          git push
